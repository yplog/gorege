version: "3"

vars:
  GOFLAGS: ""
  FUZZTIME: 5s

tasks:
  default:
    desc: Run tests (same as `task test`)
    cmds:
      - task: test

  tidy:
    desc: Tidy module dependencies
    cmds:
      - go mod tidy

  fmt:
    desc: Format all packages
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  build:
    desc: Verify the module compiles
    cmds:
      - go build {{.GOFLAGS}} ./...

  build-cli:
    desc: Build the gorege binary into ./bin/
    cmds:
      - mkdir -p bin
      - go build {{.GOFLAGS}} -o bin/gorege ./cmd/gorege

  test:
    desc: Run unit tests
    cmds:
      - go test {{.GOFLAGS}} ./...

  test-race:
    desc: Run tests with the race detector
    cmds:
      - go test -race ./...

  fuzz-load:
    desc: Fuzz JSON Load (e.g. task fuzz-load FUZZTIME=30s)
    cmds:
      - go test -fuzz=FuzzLoad -fuzztime={{.FUZZTIME}} .

  fuzz-check:
    desc: Fuzz Check/PartialCheck/Explain/Closest on fixed engine
    cmds:
      - go test -fuzz=FuzzCheckTwoDims -fuzztime={{.FUZZTIME}} .
      - go test -fuzz=FuzzPartialCheckTwoDims -fuzztime={{.FUZZTIME}} .
      - go test -fuzz=FuzzExplainTwoDims -fuzztime={{.FUZZTIME}} .
      - go test -fuzz=FuzzClosestTwoDims -fuzztime={{.FUZZTIME}} .

  cover:
    desc: Run tests with coverage summary (per package + merged total)
    cmds:
      - go test -cover -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out | tail -n 1

  lint:
    desc: Run golangci-lint (mise provides the binary)
    cmds:
      - golangci-lint run ./...

  ci:
    desc: Typical CI sequence (fmt check, vet, test, build)
    cmds:
      - test -z "$(gofmt -l .)"
      - task: vet
      - task: test
      - task: build
